<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>infoVisUtils Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #333; }
    h1 { margin-bottom: 0.5rem; }
    h2 { margin-top: 2rem; margin-bottom: 0.75rem; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 0.25rem; }
    .stats { display: flex; flex-wrap: wrap; gap: 1rem; }
    .stat { background: #f5f5f5; border-radius: 8px; padding: 1rem; min-width: 120px; text-align: center; }
    .stat .label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
    .stat .value { font-size: 1.4rem; font-weight: 600; margin-top: 0.25rem; }
    .histogram { display: flex; align-items: flex-end; gap: 4px; height: 160px; margin-top: 0.5rem; }
    .bar { flex: 1; border-radius: 4px 4px 0 0; position: relative; min-width: 30px; transition: opacity 0.2s; }
    .bar:hover { opacity: 0.8; }
    .bar-label { position: absolute; bottom: -1.5rem; left: 0; right: 0; text-align: center; font-size: 0.7rem; color: #888; }
    .bar-count { position: absolute; top: -1.3rem; left: 0; right: 0; text-align: center; font-size: 0.75rem; font-weight: 600; }
    table { border-collapse: collapse; width: 100%; margin-top: 0.5rem; }
    th, td { padding: 0.5rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f9f9f9; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; color: #666; }
    td { font-variant-numeric: tabular-nums; }
    .note { margin-top: 2rem; padding: 0.75rem 1rem; background: #fffbe6; border-left: 3px solid #f0c000; font-size: 0.85rem; color: #665500; }
  </style>
</head>
<body>
  <h1>infoVisUtils Demo</h1>
  <p>Interactive demonstration of the teaching utility library.</p>

  <h2>Summary Statistics</h2>
  <div class="stats" id="stats"></div>

  <h2>Score Distribution</h2>
  <div class="histogram" id="histogram"></div>

  <h2>Scores by Grade</h2>
  <table id="grade-table">
    <thead><tr><th>Grade</th><th>Count</th><th>Mean</th><th>Min</th><th>Max</th></tr></thead>
    <tbody></tbody>
  </table>

  <div class="note">
    Note: This page must be served over HTTP because it uses ES modules.<br>
    Try: <code>npx serve .</code> or <code>python3 -m http.server</code> from the project root.
  </div>

  <!-- ES module import — requires a local server -->
  <script type="module">
    import u from "../infoVisUtils.js";

    // Dataset
    const students = [
      { name: "Alice",   score: 92, grade: "A" },
      { name: "Bob",     score: 78, grade: "B" },
      { name: "Carol",   score: 85, grade: "B" },
      { name: "Dan",     score: 64, grade: "D" },
      { name: "Eve",     score: 91, grade: "A" },
      { name: "Frank",   score: 73, grade: "C" },
      { name: "Grace",   score: 88, grade: "B" },
      { name: "Hank",    score: 55, grade: "F" },
      { name: "Iris",    score: 97, grade: "A" },
      { name: "Jack",    score: 70, grade: "C" },
    ];

    const scores = u.unpack(students, "score");

    // --- Section 1: Summary stats ---
    const statsEl = document.getElementById("stats");
    const stats = [
      ["Mean",    u.formatNumber(u.mean(scores))],
      ["Median",  u.formatNumber(u.median(scores))],
      ["Std Dev", u.formatNumber(u.stdDev(scores))],
      ["Min",     u.formatNumber(u.min(scores))],
      ["Max",     u.formatNumber(u.max(scores))],
    ];
    for (const [label, value] of stats) {
      statsEl.innerHTML += `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    // --- Section 2: Histogram with color ---
    const bins = u.bin(scores, 5);
    const maxCount = u.max(bins.map((b) => b.count));
    const [lo, hi] = u.extent(scores);
    const heat = u.colorScale([lo, hi], ["#4a90d9", "#f5a623", "#d0021b"]);
    const histEl = document.getElementById("histogram");

    for (const b of bins) {
      const pct = maxCount > 0 ? (b.count / maxCount) * 100 : 0;
      const midVal = (b.min + b.max) / 2;
      const color = heat(midVal);
      histEl.innerHTML += `
        <div class="bar" style="height:${pct}%; background:${color}">
          <span class="bar-count">${b.count}</span>
          <span class="bar-label">${Math.round(b.min)}–${Math.round(b.max)}</span>
        </div>`;
    }

    // --- Section 3: Grouped table ---
    const byGrade = u.groupBy(students, "grade");
    const tbody = document.querySelector("#grade-table tbody");

    const summary = u.sortBy(
      Object.entries(byGrade).map(([grade, rows]) => {
        const s = u.unpack(rows, "score");
        return { grade, count: rows.length, mean: u.mean(s), min: u.min(s), max: u.max(s) };
      }),
      "grade"
    );

    for (const row of summary) {
      tbody.innerHTML += `<tr>
        <td>${row.grade}</td>
        <td>${row.count}</td>
        <td>${u.formatNumber(row.mean)}</td>
        <td>${u.formatNumber(row.min, 0)}</td>
        <td>${u.formatNumber(row.max, 0)}</td>
      </tr>`;
    }
  </script>
</body>
</html>
